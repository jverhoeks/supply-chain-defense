# cargo-deny configuration (cargo-deny >= 0.16 / 0.19 schema)
# Install: cargo install cargo-deny
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

# Vulnerability advisories (from RustSec Advisory Database)
# In 0.16+, cargo-deny checks all advisories by default.
# Use 'ignore' to suppress specific findings with a documented reason.
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # Example: { id = "RUSTSEC-2020-0071", reason = "Not exploitable in our usage pattern" }
]

# License policy — only packages with listed licenses are allowed.
# Any license NOT in this list is rejected.
# Copyleft licenses are blocked by omission (GPL, LGPL, AGPL are not in the allow list).
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Zlib",
]
confidence-threshold = 0.8

# Per-crate exceptions (use sparingly, document the reason):
# exceptions = [
#     { allow = ["OpenSSL"], crate = "openssl-sys" },
# ]

# Bans policy
[bans]
# Warn on duplicate crate versions (forces deduplication)
multiple-versions = "warn"

# Deny crates with known-bad build scripts or supply chain issues:
# deny = [
#     { crate = "openssl", reason = "Use rustls instead" },
# ]

# Sources policy — controls where crates can come from
[sources]
# Deny crates from registries not in the allow list
unknown-registry = "deny"
# Deny crates from arbitrary git repos
unknown-git = "deny"
# Only crates.io is allowed by default
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# Trusted git orgs (use sparingly; prefer crates.io):
# [sources.allow-org]
# github = ["my-trusted-org"]
