# Global pip configuration for supply chain protection
# Location options:
#   Unix system-wide: /etc/pip.conf
#   Unix user-level:  ~/.pip/pip.conf  or  ~/.config/pip/pip.conf
#   Per-virtualenv:   $VIRTUAL_ENV/pip.conf
#   Override:         $PIP_CONFIG_FILE environment variable

[global]
# Require hashes for all packages.
# This forces every package in requirements.txt to have --hash= annotations.
# Blocks any tampered package (hash mismatch = install fails).
# Pair with: pip-compile --generate-hashes  to generate a requirements.txt with hashes.
require-hashes = true

# Install only pre-built wheels, never source distributions.
# Source distributions (sdist/.tar.gz) run setup.py during install = arbitrary code execution.
# --only-binary :all: blocks this attack vector entirely.
# WARNING: some packages have no wheel for your platform; add exceptions below.
only-binary = :all:

# Exceptions for packages that have no wheel (add only after reviewing source code):
# no-binary = mysqlclient,cryptography

# Index URL - use a specific registry, not the default PyPI
# For corporate environments: point to an internal mirror (Artifactory, Nexus, etc.)
# that scans packages before serving them.
index-url = https://pypi.org/simple/

# Extra indexes (note: extra-index-url is a DEPENDENCY CONFUSION RISK)
# If you use extra-index-url, always use --extra-index-url with a lower-priority flag
# or fully scope packages. Prefer a single internal proxy over extra-index-url.
# extra-index-url = https://pypi.internal.company.com/simple/

# Disable legacy resolver (new resolver is more secure and correct)
use-feature = truststore

# Timeout (prevent slow/hanging installs in CI)
timeout = 60

[install]
# Do not run setup.py scripts for packages fetched from VCS (git+https://)
# This is a secondary defense; use --only-binary :all: as primary.
# no-build-isolation prevents PEP 517 build isolation being bypassed.
