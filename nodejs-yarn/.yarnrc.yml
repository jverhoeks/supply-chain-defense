# Supply chain protection for Yarn Berry (v2/v3/v4)
# Requires Yarn >= 4.0 for hardenedMode; >= 4.10 for npmMinimalAgeGate

# Minimum release age gate (Yarn 4.10+)
# Blocks packages published less than N minutes ago.
# 10080 = 7 days, 4320 = 3 days, 1440 = 1 day
npmMinimalAgeGate: 10080

# Hardened mode (Yarn 4.0+)
# Validates that package metadata in yarn.lock matches the registry at install time.
# Prevents lockfile injection attacks (malicious PR changes to yarn.lock).
# Automatically enabled in CI environments that set YARN_ENABLE_HARDENED_MODE=1.
enableHardenedMode: true

# Disable install scripts globally.
# This prevents postinstall/preinstall script execution for all packages.
# To allow specific packages: add them to the "dependenciesMeta" section in package.json.
enableScripts: false

# Node linker: use node-modules for compatibility, pnp for strictest isolation.
# pnp mode prevents phantom dependency access (packages can only import declared deps).
nodeLinker: node-modules

# Checksum behavior: throw an error if a package's checksum doesn't match.
# Options: throw | warn | ignore | update
checksumBehavior: throw

# Immutable installs in CI: yarn install --immutable
# Add to CI scripts instead of here to keep local dev flexible.

# Use the official npm registry
npmRegistryServer: "https://registry.npmjs.org"

# For private scoped packages:
# npmScopes:
#   myorg:
#     npmRegistryServer: "https://npm.internal.company.com"
#     npmAuthToken: "${NPM_AUTH_TOKEN}"

# Telemetry
enableTelemetry: false
