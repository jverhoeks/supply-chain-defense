# devpi-server configuration
# Docs: https://devpi.net/docs/devpi/devpi/stable/+doc/quickstart-server.html
#
# Run with: devpi-server --host 0.0.0.0 --port 3141 --serverdir /devpi-data
# Or via Docker: see docker-compose.yml
#
# devpi does NOT have native server-side release-age enforcement.
# Age protection for Python is enforced at the CLIENT side:
#   uv.toml:   exclude-newer = "P7D"
#   pip.conf:  (no native setting — use a private proxy + manual review)
#
# devpi provides:
#   - Caching / air-gap: packages served from local cache once downloaded
#   - Index inheritance: create a local index that inherits from PyPI,
#     allowing you to block or shadow specific packages
#   - Immutable releases: once a version is cached it cannot change
#
# Index layout for a team setup:
#   root/pypi  (mirroring PyPI)
#   myteam/dev (inherits from root/pypi, add internal packages here)
#
# Point pip/uv at devpi:
#   pip.conf:   index-url = http://localhost:3141/root/pypi/+simple/
#   uv.toml:    [pip]  index-url = "http://localhost:3141/root/pypi/+simple/"

[server]
host = 0.0.0.0
port = 3141
